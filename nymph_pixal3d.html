<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixal3D</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07100f;
      --panel: #101817;
      --panel-2: #162321;
      --line: #25413d;
      --text: #ecfffb;
      --muted: #95b8b2;
      --accent: #00f0d8;
      --accent-2: #ff8a2a;
      --danger: #ff5e6c;
      --ok: #9cff57;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    button, input, select {
      font: inherit;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      height: 100vh;
      min-height: 620px;
    }

    .sidebar {
      min-width: 0;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid var(--line);
      background: #0b1514;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .badge {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid #ffc840;
      border-radius: 8px;
      color: #ffc840;
      font-weight: 800;
      background: #111817;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      padding: 16px 0;
      border-top: 1px solid rgba(37, 65, 61, 0.85);
    }

    .section:first-of-type { border-top: 0; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #bdebe4;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .drop {
      min-height: 230px;
      display: grid;
      place-items: center;
      position: relative;
      border: 1px dashed #386963;
      border-radius: 8px;
      background: #0e1918;
      overflow: hidden;
      cursor: pointer;
    }

    .drop.drag { border-color: var(--accent); background: #102522; }

    .drop img {
      max-width: 100%;
      max-height: 360px;
      display: none;
      object-fit: contain;
    }

    .drop-hint {
      display: grid;
      gap: 8px;
      justify-items: center;
      color: var(--muted);
      text-align: center;
      padding: 22px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .params {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0;
      border-top: 0;
      background: transparent;
    }

    .params .field {
      margin: 0;
    }

    .params .wide {
      grid-column: span 2;
    }

    label {
      display: block;
      font-size: 13px;
      color: #d7f4ef;
      margin-bottom: 7px;
    }

    .field {
      margin-bottom: 12px;
    }

    input, select {
      width: 100%;
      height: 42px;
      border: 1px solid #314b48;
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-2);
      padding: 0 12px;
      outline: none;
    }

    input:focus, select:focus { border-color: var(--accent); }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      color: #d7f4ef;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-2);
    }

    input[type="range"] {
      height: 28px;
      padding: 0;
      accent-color: var(--accent-2);
      background: transparent;
      border: 0;
    }

    .value {
      float: right;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .btn {
      height: 48px;
      border: 1px solid transparent;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: #05110f;
      background: var(--accent);
      font-weight: 850;
      cursor: pointer;
      width: 100%;
    }

    .btn.secondary {
      color: var(--text);
      background: #14211f;
      border-color: #335b55;
    }

    .btn.warn {
      color: white;
      background: var(--accent-2);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .stage {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: #0a1110;
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid var(--line);
      background: #0f1716;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      min-width: 0;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 4px rgba(149, 184, 178, 0.12);
    }

    .dot.work { background: var(--accent-2); }
    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--danger); }

    .workspace {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .preview {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(82px, auto);
      height: 100%;
      background: #0d1514;
      overflow: hidden;
    }

    .viewer {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 18px;
      position: relative;
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
    }

    .pane-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pane-body {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      border: 1px solid #263f3b;
      border-radius: 8px;
      background: #08100f;
      overflow: hidden;
      position: relative;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    #hero-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: none;
      background: #0a1110;
    }

    #reference-large {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    .filmstrip {
      min-height: 104px;
      display: flex;
      gap: 10px;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--line);
      overflow-x: auto;
      background: #0f1716;
    }

    .frame {
      width: 116px;
      height: 72px;
      object-fit: cover;
      border: 1px solid #314b48;
      border-radius: 8px;
      cursor: pointer;
      background: #111;
      flex: 0 0 auto;
    }

    .frame.active { border-color: var(--accent); }

    .sidepanel {
      min-height: 0;
      padding: 0;
    }

    .progress-box {
      border: 1px solid #2b4b46;
      border-radius: 8px;
      padding: 12px;
      background: #101817;
      margin-bottom: 14px;
    }

    .progress-box .status {
      font-size: 12px;
      line-height: 1.35;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #223532;
      margin-top: 10px;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 160ms ease;
    }

    .meta {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .meta strong {
      color: var(--text);
      font-weight: 750;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: 360px;
      padding: 12px 14px;
      border: 1px solid #365f59;
      border-radius: 8px;
      color: var(--text);
      background: #111d1b;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: 160ms ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .sidebar { height: auto; max-height: none; border-right: 0; border-bottom: 1px solid var(--line); }
      .stage { height: 86vh; min-height: 680px; }
      .viewer { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); }
      .params { grid-template-columns: 1fr 1fr; }
      .sidepanel { border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="badge">PX</div>
        <div>
          <h1>Pixal3D</h1>
          <div class="sub">single image to textured GLB</div>
        </div>
      </div>

      <section class="section">
        <div class="section-title"><i data-lucide="image"></i> Source</div>
        <div class="drop" id="drop">
          <input id="file" type="file" accept="image/*" hidden>
          <img id="source-preview" alt="Source preview">
          <div class="drop-hint" id="drop-hint">
            <i data-lucide="upload-cloud"></i>
            <div>Drop an image here or click to choose</div>
          </div>
        </div>
      </section>

      <section class="section">
        <button class="btn" id="generate" disabled><i data-lucide="sparkles"></i> Generate Preview</button>
        <div style="height:10px"></div>
        <button class="btn secondary" id="extract" disabled><i data-lucide="package"></i> Export GLB</button>
      </section>

      <section class="section">
        <div class="section-title"><i data-lucide="sliders-horizontal"></i> Parameters</div>
        <div class="params">
          <div class="field">
            <label for="resolution">Resolution</label>
            <select id="resolution">
              <option value="1024">1024</option>
              <option value="1536">1536</option>
            </select>
          </div>
          <div class="field">
            <label for="seed">Seed</label>
            <input id="seed" type="number" value="42">
          </div>
          <div class="field">
            <label for="texture-size">Texture</label>
            <select id="texture-size">
              <option value="1024">1024</option>
              <option value="2048">2048</option>
              <option value="4096">4096</option>
            </select>
          </div>
          <div class="field">
            <label for="faces">Faces</label>
            <select id="faces">
              <option value="500000">500k</option>
              <option value="1000000" selected>1M</option>
              <option value="1500000">1.5M</option>
            </select>
          </div>
          <div class="field wide">
            <label for="ss-steps">Structure Steps <span class="value" id="ss-steps-value">12</span></label>
            <input id="ss-steps" type="range" min="4" max="32" step="1" value="12">
          </div>
          <div class="field wide">
            <label for="shape-steps">Shape Steps <span class="value" id="shape-steps-value">12</span></label>
            <input id="shape-steps" type="range" min="4" max="32" step="1" value="12">
          </div>
          <div class="field wide">
            <label for="tex-steps">Texture Steps <span class="value" id="tex-steps-value">12</span></label>
            <input id="tex-steps" type="range" min="4" max="32" step="1" value="12">
          </div>
          <div class="field">
            <label for="fov">FOV</label>
            <input id="fov" type="number" value="0.2" step="0.01" min="0.0175" max="2.9671" disabled>
          </div>
          <div class="field">
            <label for="fov-unit">Unit</label>
            <select id="fov-unit" disabled>
              <option value="rad" selected>rad</option>
              <option value="deg">deg</option>
            </select>
          </div>
          <div class="toggle-row wide">
            <span>Auto camera with MoGe</span>
            <input id="auto-fov" type="checkbox" checked>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><i data-lucide="activity"></i> Run</div>
        <div class="progress-box">
          <div class="status">
            <span class="dot" id="progress-dot"></span>
            <span id="progress-stage">Idle</span>
          </div>
          <div class="bar"><span id="progress-bar"></span></div>
        </div>

        <div class="meta">
          <div><strong>State</strong> <span id="state-label">No run yet</span></div>
          <div><strong>Camera</strong> <span id="camera-label">Auto</span></div>
          <div><strong>Output</strong> <span id="output-label">None</span></div>
        </div>

        <button class="btn secondary" id="open-output" disabled><i data-lucide="external-link"></i> Open GLB</button>
        <p class="note" id="runtime-note"></p>
      </section>
    </aside>

    <section class="stage">
      <header class="topbar">
        <div class="status">
          <span class="dot" id="dot"></span>
          <span id="status-text">Waiting for image</span>
        </div>
        <div class="status" id="runtime-text">runtime</div>
      </header>

      <div class="workspace">
        <div class="preview">
          <div class="viewer">
            <div class="pane">
              <div class="pane-title">Reference</div>
              <div class="pane-body">
                <div class="empty" id="ref-empty">
                  <i data-lucide="image"></i>
                  <div>Choose an image.</div>
                </div>
                <img id="reference-large" alt="Reference image">
              </div>
            </div>
            <div class="pane">
              <div class="pane-title">Result</div>
              <div class="pane-body">
                <div class="empty" id="empty">
                  <i data-lucide="box"></i>
                  <div>Preview frames and GLB appear here.</div>
                </div>
                <img id="hero-image" alt="Selected preview frame">
                <model-viewer id="model" camera-controls auto-rotate shadow-intensity="0.6" exposure="1"></model-viewer>
              </div>
            </div>
          </div>
          <div class="filmstrip" id="filmstrip"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { Client, handle_file } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    const sessionId = crypto.randomUUID();
    let client = null;
    let currentFile = null;
    let generationResult = null;
    let outputUrl = "";
    let outputPath = "";
    let progressTimer = null;
    let warmupTimer = null;
    let busy = false;

    const $ = (id) => document.getElementById(id);

    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove("show"), 3200);
    }

    function setStatus(message, mode = "") {
      $("status-text").textContent = message;
      $("dot").className = `dot ${mode}`;
    }

    function setBusy(isBusy) {
      busy = isBusy;
      $("generate").disabled = isBusy || !currentFile;
      $("extract").disabled = isBusy || !generationResult;
      $("progress-dot").className = `dot ${isBusy ? "work" : ""}`;
    }

    function updateSliderLabels() {
      for (const id of ["ss-steps", "shape-steps", "tex-steps"]) {
        $(`${id}-value`).textContent = $(id).value;
      }
    }

    function selectedManualFov() {
      if ($("auto-fov").checked) return -1.0;
      const value = parseFloat($("fov").value || "0.2");
      return $("fov-unit").value === "rad" ? value : value;
    }

    function renderFrame(url, active = true) {
      if (active) {
        $("empty").style.display = "none";
        $("model").style.display = "none";
        $("hero-image").src = url;
        $("hero-image").style.display = "block";
      }
    }

    function normalizeFileUrl(file) {
      if (!file) return "";
      if (file.url) return file.url;
      if (file.path) return `/tmp/${file.path.split(/[\\/]/).pop()}`;
      return "";
    }

    function populateFrames(renderPaths) {
      const filmstrip = $("filmstrip");
      filmstrip.innerHTML = "";
      const forest = renderPaths.shaded_forest || [];
      const fallback = Object.values(renderPaths).flat();
      const frames = forest.length ? forest : fallback;

      frames.forEach((file, index) => {
        const url = normalizeFileUrl(file);
        const img = document.createElement("img");
        img.className = `frame ${index === 0 ? "active" : ""}`;
        img.src = url;
        img.alt = `Preview frame ${index + 1}`;
        img.onclick = () => {
          document.querySelectorAll(".frame").forEach((node) => node.classList.remove("active"));
          img.classList.add("active");
          renderFrame(url);
        };
        filmstrip.appendChild(img);
        if (index === 0) renderFrame(url);
      });
    }

    function startProgress() {
      clearInterval(progressTimer);
      $("progress-stage").textContent = "Starting";
      $("progress-bar").style.width = "0%";
      progressTimer = setInterval(async () => {
        try {
          const response = await fetch(`/progress?session_id=${sessionId}`);
          if (!response.ok) return;
          const data = await response.json();
          if (data.done) return;
          const total = Number(data.total || 0);
          const step = Number(data.step || 0);
          $("progress-stage").textContent = data.stage || "Processing";
          $("progress-bar").style.width = total > 0 ? `${Math.min(100, (step / total) * 100)}%` : "14%";
        } catch {}
      }, 500);
    }

    function stopProgress(done = false) {
      clearInterval(progressTimer);
      progressTimer = null;
      if (done) $("progress-bar").style.width = "100%";
    }

    async function pollWarmup() {
      try {
        const response = await fetch("/warmup_status");
        if (!response.ok) return;
        const data = await response.json();
        if (busy) return;

        const total = Number(data.total || 0);
        const step = Number(data.step || 0);
        if (data.status === "loading") {
          $("progress-dot").className = "dot work";
          $("progress-stage").textContent = data.stage || "Loading model";
          $("progress-bar").style.width = total > 0 ? `${Math.min(100, (step / total) * 100)}%` : "12%";
          if (!currentFile) setStatus("Preloading model", "work");
        } else if (data.status === "ready") {
          $("progress-dot").className = "dot ok";
          $("progress-stage").textContent = "Model ready";
          $("progress-bar").style.width = "100%";
          if (!currentFile) setStatus("Model ready", "ok");
          clearInterval(warmupTimer);
        } else if (data.status === "error") {
          $("progress-dot").className = "dot err";
          $("progress-stage").textContent = data.error || "Model preload failed";
          $("progress-bar").style.width = "0%";
          if (!currentFile) setStatus("Preload failed", "err");
          clearInterval(warmupTimer);
        }
      } catch {}
    }

    function startWarmupPolling() {
      clearInterval(warmupTimer);
      pollWarmup();
      warmupTimer = setInterval(pollWarmup, 1000);
    }

    async function preprocess(file) {
      try {
        const result = await client.predict("/preprocess", { image: handle_file(file), session_id: sessionId });
        const url = result?.data?.[0]?.url;
        if (url) {
          $("source-preview").src = url;
          $("reference-large").src = url;
        }
      } catch (err) {
        console.warn("Preprocess failed, generation will preprocess server-side.", err);
      }
    }

    async function generate() {
      if (!currentFile) return;
      setBusy(true);
      setStatus("Generating preview", "work");
      $("state-label").textContent = "Generating";
      $("output-label").textContent = "None";
      outputUrl = "";
      outputPath = "";
      generationResult = null;
      $("open-output").disabled = true;
      $("model").removeAttribute("src");
      $("model").style.display = "none";
      startProgress();

      try {
        const result = await client.predict("/generate_3d", {
          image: handle_file(currentFile),
          seed: parseInt($("seed").value || "42", 10),
          resolution: parseInt($("resolution").value || "1024", 10),
          ss_sampling_steps: parseInt($("ss-steps").value || "12", 10),
          shape_slat_sampling_steps: parseInt($("shape-steps").value || "12", 10),
          tex_slat_sampling_steps: parseInt($("tex-steps").value || "12", 10),
          manual_fov: selectedManualFov(),
          fov_unit: $("fov-unit").value,
          session_id: sessionId,
        });

        generationResult = result.data[0];
        populateFrames(generationResult.render_paths || {});
        $("camera-label").textContent = `fov ${Number(generationResult.camera_angle_x || 0).toFixed(3)}, distance ${Number(generationResult.distance || 0).toFixed(3)}`;
        $("state-label").textContent = "Preview ready";
        $("extract").disabled = false;
        setStatus("Preview ready", "ok");
        stopProgress(true);
      } catch (err) {
        console.error(err);
        setStatus("Generation failed", "err");
        $("state-label").textContent = "Generation failed";
        stopProgress(false);
        toast("Generation failed. Check Logs for the traceback.");
      } finally {
        setBusy(false);
      }
    }

    async function extract() {
      if (!generationResult) return;
      setBusy(true);
      setStatus("Exporting GLB", "work");
      $("state-label").textContent = "Exporting GLB";
      startProgress();

      try {
        const result = await client.predict("/extract_glb_api", {
          state_path: generationResult.state_path,
          decimation_target: parseInt($("faces").value || "1000000", 10),
          texture_size: parseInt($("texture-size").value || "1024", 10),
          session_id: sessionId,
        });

        const file = result.data[0];
        outputUrl = normalizeFileUrl(file);
        outputPath = file.path || outputUrl;
        $("model").src = outputUrl;
        $("model").style.display = "block";
        $("hero-image").style.display = "none";
        $("empty").style.display = "none";
        $("output-label").textContent = outputPath.split(/[\\/]/).pop();
        $("open-output").disabled = false;
        $("state-label").textContent = "GLB ready";
        setStatus("GLB ready", "ok");
        stopProgress(true);
      } catch (err) {
        console.error(err);
        setStatus("Export failed", "err");
        $("state-label").textContent = "Export failed";
        stopProgress(false);
        toast("Export failed. Check Logs for the traceback.");
      } finally {
        setBusy(false);
      }
    }

    async function init() {
      lucide.createIcons();
      updateSliderLabels();
      for (const id of ["ss-steps", "shape-steps", "tex-steps"]) {
        $(id).addEventListener("input", updateSliderLabels);
      }

      $("auto-fov").addEventListener("change", () => {
        const manual = !$("auto-fov").checked;
        $("fov").disabled = !manual;
        $("fov-unit").disabled = !manual;
      });

      $("generate").onclick = generate;
      $("extract").onclick = extract;
      $("open-output").onclick = () => {
        if (outputUrl) window.open(outputUrl, "_blank");
      };

      const drop = $("drop");
      const fileInput = $("file");
      drop.onclick = () => fileInput.click();
      drop.ondragover = (event) => {
        event.preventDefault();
        drop.classList.add("drag");
      };
      drop.ondragleave = () => drop.classList.remove("drag");
      drop.ondrop = (event) => {
        event.preventDefault();
        drop.classList.remove("drag");
        if (event.dataTransfer.files.length) useFile(event.dataTransfer.files[0]);
      };
      fileInput.onchange = (event) => {
        if (event.target.files.length) useFile(event.target.files[0]);
      };

      try {
        client = await Client.connect(window.location.origin);
        const response = await fetch("/app_config");
        const cfg = await response.json();
        $("resolution").value = cfg.low_vram ? "1024" : "1536";
        $("texture-size").value = String(cfg.texture_size || 1024);
        $("runtime-text").textContent = cfg.weight_format === "gguf-experimental"
          ? `GGUF ${cfg.gguf_quant}${cfg.gguf_supported ? "" : " fetched"}`
          : "safetensors";
        $("runtime-note").textContent = cfg.gguf_supported
          ? "GGUF runtime is available for this session."
          : "Safetensors are active. GGUF weights can be fetched now and will become selectable after the runtime bridge is verified.";
        setStatus("Waiting for image");
        startWarmupPolling();
      } catch (err) {
        console.error(err);
        setStatus("Connection failed", "err");
        toast("Could not connect to Pixal3D backend.");
      }
    }

    function useFile(file) {
      currentFile = file;
      generationResult = null;
      outputUrl = "";
      outputPath = "";
      $("generate").disabled = false;
      $("extract").disabled = true;
      $("open-output").disabled = true;
      $("filmstrip").innerHTML = "";
      $("model").style.display = "none";
      $("model").removeAttribute("src");
      $("empty").style.display = "none";
      $("source-preview").style.display = "block";
      $("drop-hint").style.display = "none";
      const localUrl = URL.createObjectURL(file);
      $("source-preview").src = localUrl;
      $("reference-large").src = localUrl;
      $("reference-large").style.display = "block";
      $("ref-empty").style.display = "none";
      $("hero-image").src = localUrl;
      $("hero-image").style.display = "block";
      $("state-label").textContent = "Image ready";
      setStatus("Image ready", "ok");
      preprocess(file);
    }

    init();
  </script>
</body>
</html>
